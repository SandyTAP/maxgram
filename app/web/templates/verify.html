{% extends "base.html" %}
{% block title %}Проверка OTP — MaxGram{% endblock %}
{% block content %}
<div class="mx-auto max-w-xl rounded-3xl border border-white/10 bg-white/10 p-8 shadow-2xl backdrop-blur">
  <h1 class="text-3xl font-black">Введите OTP</h1>
  <p class="mt-3 text-slate-300">Код отправлен в Telegram и действует <span id="timer">{{ otp_ttl }}</span> секунд.</p>
  {% if error %}<div class="mt-5 rounded-2xl border border-red-400/40 bg-red-500/10 p-4 text-red-100">{{ error }}</div>{% endif %}
  <form method="post" action="/auth/verify" class="mt-8 space-y-5">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="email" value="{{ email }}">
    <input required name="code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" pattern="[0-9]{6}" class="w-full rounded-2xl border border-white/10 bg-slate-900 px-4 py-4 text-center text-3xl tracking-[0.5em] outline-none ring-blue-500 focus:ring-2" placeholder="000000">
    <button class="w-full rounded-2xl bg-blue-500 px-6 py-3 font-bold hover:bg-blue-400">Подтвердить вход</button>
  </form>
</div>
<script>
let left = {{ otp_ttl }};
const timer = document.getElementById('timer');
setInterval(() => { left = Math.max(0, left - 1); timer.textContent = left; }, 1000);
</script>
{% endblock %}
