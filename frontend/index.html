<!DOCTYPE html>
<html lang="ru">
<head>

<link rel="icon" type="image/png" href="/frontend/assets/favicon.png">

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Maxgram</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
>

<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
>

<link rel="stylesheet" href="./style.css">

<script src="scripts/background.js" defer></script>
<script src="scripts/qr.js" defer></script>
<script src="scripts/expired.js" defer></script>


</head>

<body>

<div class="login-box">

    <div class="top-icons">

        <img
            class="icon white-icon"
            src="assets/icon.svg"
            alt=""
        >

        <img
            class="icon white-icon"
            src="assets/question.svg"
            alt=""
        >

    </div>


    <div class="qr-wrapper">

        <img
            class="qr"
            id="qr"
            src=""
            alt=""
        >

        <div
            class="qr-expired hidden"
            id="qrExpired"
        >

            <button
                class="refresh-btn"
                id="refreshBtn"
            >

                <img
                    class="retry-icon"
                    src="./assets/retry.svg"
                    alt=""
                >

            </button>

        </div>

    </div>


    <div class="title">
        Войдите в Maxgram по QR-коду
    </div>

    <div class="subtitle">
        Наведите камеру на QR-код,
        чтобы войти в профиль
        или скачать приложение
    </div>

    <div id="auth-error" class="hidden error-message"></div>



</body>
</html>
