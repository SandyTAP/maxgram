<!DOCTYPE html>
<html lang="ru">
<head>

<link rel="icon" type="image/png" href="/frontend/assets/favicon.png">

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>MAXGRAM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
>

<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
>

<link rel="stylesheet" href="./style.css">

<script src="scripts/background.js" defer></script>
<script src="scripts/qr.js" defer></script>
<script src="scripts/expired.js" defer></script>
<script src="scripts/phone.js" defer></script>


</head>

<body>

<div class="login-box">

    <div class="top-icons">

        <img
            class="icon white-icon"
            src="assets/icon.svg"
            alt=""
        >

        <img
            class="icon white-icon"
            src="assets/question.svg"
            alt=""
        >

    </div>


    <div class="qr-wrapper">

        <img
            class="qr"
            id="qr"
            src=""
            alt=""
        >

        <div
            class="qr-expired hidden"
            id="qrExpired"
        >

            <button
                class="refresh-btn"
                id="refreshBtn"
            >

                <img
                    class="retry-icon"
                    src="./assets/retry.svg"
                    alt=""
                >

            </button>

        </div>

    </div>


    <div class="title">
        Войдите в MAXGRAM по QR-коду
    </div>

    <div class="subtitle">
        Наведите камеру на QR-код,
        чтобы войти в профиль
        или скачать приложение
    </div>

    <div id="auth-error" class="hidden error-message"></div>

    <button
        class="phone-login-btn"
        id="phoneLoginBtn"
        type="button"
    >
        Войти по номеру
    </button>

    <div
        class="phone-form hidden"
        id="phoneForm"
    >

        <div class="phone-field">
            <div class="country-code">
                <span class="flag">🇷🇺</span>
                <span>+7</span>
            </div>

            <input
                id="phoneInput"
                class="phone-input"
                type="tel"
                inputmode="numeric"
                autocomplete="tel"
                placeholder="123 456 78 90"
                maxlength="13"
            >
        </div>

        <div class="phone-hint">
            Для входа нужен номер из России. Код появится ниже в тестовом режиме.
        </div>

        <button
            class="continue-btn"
            id="phoneContinueBtn"
            type="button"
            disabled
        >
            Продолжить
        </button>

        <div
            class="code-form hidden"
            id="codeForm"
        >
            <div
                class="dev-code"
                id="devCode"
            ></div>

            <input
                id="codeInput"
                class="code-input"
                type="text"
                inputmode="numeric"
                autocomplete="one-time-code"
                placeholder="Код из SMS"
                maxlength="6"
            >

            <button
                class="continue-btn"
                id="codeContinueBtn"
                type="button"
                disabled
            >
                Войти
            </button>
        </div>

        <button
            class="back-qr-btn"
            id="backQrBtn"
            type="button"
        >
            Назад к QR-коду
        </button>

        <div
            class="phone-message"
            id="phoneMessage"
        ></div>
    </div>



</body>
</html>
